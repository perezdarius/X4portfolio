<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <title>Log in</title>
     
</head>
<body>
    <div class="login-bg">
    <div class="login-card">
        <h2 class="mb-4 fw-bold text-light text-center">Log in</h2>
        
        <form action="index.html" method="POST">
            <div class="mb-3">
                <label class="form-label text-light">Email Address</label>
                <input type="email" class="form-control" placeholder="example@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="signin.html" class="forgot-link text-light small">Forgot password?</a>
                <button type="submit" class="btn btn-outline-light rounded-pill px-4">Log in</button>
            </div>
        </form>

        <div class="mt-5 text-center text-light">
            <p class="mb-2">Not a member yet?</p>
            <a href="signin.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Join Now</a>
        </div>
    </div>
</div>

 </body>
</html>
