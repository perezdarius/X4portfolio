<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <title>Sign Up - Metro Brew</title>
</head>
<body>
    <div class="login-bg">
    <div class="login-card">
        <h2 class="mb-4 fw-bold text-light text-center">Sign Up</h2>
        
        <form action="index.html" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-light">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-light">Email Address</label>
                    <input type="email" class="form-control" placeholder="example@email.com" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label text-light">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-light">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-outline-light rounded-pill w-100">Sign in</button>
            </div>
        </form>

        <div class="mt-4 text-center text-light border-top pt-3">
            <p class="small mb-0">Already a member? <a href="login.html" class="text-light fw-bold text-decoration-none ms-2">Log In</a></p>
        </div>
    </div>
</div>


 </body>
</html>
