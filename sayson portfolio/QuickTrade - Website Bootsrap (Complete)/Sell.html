<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickTrade - Sell Item</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link href="style.css" rel="stylesheet">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<a class="navbar-brand" href="#">Re-Run</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="Marketplace.html">Marketplace</a></li>
<li class="nav-item"><a class="nav-link" href="About.html">About Us</a></li>
</ul>

</div>
</nav>


<!-- Sell Item Section -->
<div class="container my-5">
<h2 class="text-align-left mb-2" style="margin-left: 35px;">List an Item for Sale</h2>

<div class="row">

<!-- Form -->
<div class="col-md-4">

<div class="card shadow p-3">

<form id="sellForm">

<div class="mb-3">
<label class="form-label">Item Name</label>
<input type="text" class="form-control" id="itemName" required>
</div>

<div class="mb-3">
<label class="form-label">Price (₱)</label>
<input type="number" class="form-control" id="itemPrice" required>
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<select class="form-control" id="itemCategory">
<option>Polo</option>
<option>Shirts</option>
<option>Shorts</option>
<option>Shoes</option>
<option>Jacket</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Condition</label>
<select class="form-control" id="itemCondition">
<option>Brand New</option>
<option>Like New</option>
<option>Good</option>
<option>Used</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" class="form-control" id="itemLocation">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control" id="itemDesc"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Image URL</label>
<input type="text" class="form-control" id="itemImage" placeholder="example: hoodie.jpg">
</div>

<button type="submit" class="btn btn-dark w-100">Post Item</button>

</form>

</div>
</div>


<!-- Preview Listings -->
<div class="col-md-8">

<div class="row g-4" id="listingContainer">

<!-- Listings appear here -->

</div>

</div>

</div>
</div>



<script src="js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("sellForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("itemName").value;
let price = document.getElementById("itemPrice").value;
let category = document.getElementById("itemCategory").value;
let condition = document.getElementById("itemCondition").value;
let location = document.getElementById("itemLocation").value;
let desc = document.getElementById("itemDesc").value;
let image = document.getElementById("itemImage").value;

let listing = `
<div class="col-md-4">

<div class="card shadow">

<img src="${image}" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">${name}</h5>
<p class="fw-bold">₱${price}</p>

<p class="card-text">
${desc}<br>
Condition: ${condition}<br>
Location: ${location}
</p>

</div>
</div>

</div>
`;

document.getElementById("listingContainer").innerHTML += listing;

document.getElementById("sellForm").reset();

});

</script>

</body>
</html>
